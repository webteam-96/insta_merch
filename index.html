<!doctype html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- TODO: update to your final production domain before launch -->
    <link rel="canonical" href="https://instamerch.in/" />

    <!-- Primary SEO meta -->
    <title>Insta Merch — Own a Brand That Works For You | Creator Merch Agency India</title>
    <meta
      name="description"
      content="Insta Merch is a done-for-you creator merchandise agency for Instagram influencers with 100K+ followers. We launch your premium product line, ecommerce store and fulfilment in 30 days. Add ₹50L+/year with zero operational effort."
    />
    <meta
      name="keywords"
      content="creator merchandise, influencer merch, creator brand launch, Instagram merchandise, done for you merch, creator monetization India, influencer ecommerce, Shark Tank India brands, personal brand launch, creator economy India, custom merch, white label merch India"
    />
    <meta name="author" content="Insta Merch" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="theme-color" content="#E1306C" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="application-name" content="Insta Merch" />
    <meta name="apple-mobile-web-app-title" content="Insta Merch" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:site_name" content="Insta Merch" />
    <meta property="og:url" content="https://instamerch.in/" />
    <meta property="og:title" content="Insta Merch — Own a Brand That Works For You" />
    <meta
      property="og:description"
      content="Done-for-you merchandise brand launch for creators with 100K+ followers. ₹50L+/year revenue potential, zero operational effort. Built by the team behind 3 Shark Tank India brands."
    />
    <meta property="og:image" content="https://instamerch.in/main-image.png" />
    <meta property="og:image:secure_url" content="https://instamerch.in/main-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Insta Merch — Own a brand that works for you" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Insta Merch — Own a Brand That Works For You" />
    <meta
      name="twitter:description"
      content="Done-for-you merchandise brand launch for creators with 100K+ followers. Zero operational effort."
    />
    <meta name="twitter:image" content="https://instamerch.in/main-image.png" />
    <meta name="twitter:image:alt" content="Insta Merch hero visual" />

    <!-- Font preconnects (perf + SEO signal) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload hero image -->
    <link rel="preload" as="image" href="/main-image.png" fetchpriority="high" />

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Insta Merch",
        "legalName": "Insta Merch",
        "url": "https://instamerch.in/",
        "logo": "https://instamerch.in/logo.png",
        "image": "https://instamerch.in/main-image.png",
        "description": "Done-for-you creator merchandise brand launch agency for Instagram influencers and celebrities with 100K+ followers.",
        "founder": [
          { "@type": "Person", "name": "Yuvraj Thakkar" },
          { "@type": "Person", "name": "Varish Shah" },
          { "@type": "Person", "name": "Vishnu Chauhan" }
        ],
        "address": { "@type": "PostalAddress", "addressCountry": "IN" },
        "areaServed": "IN",
        "sameAs": [
          "https://www.linkedin.com/in/yuvraj-thakkar-7047b4ab",
          "https://www.linkedin.com/in/varish-shah-4abb55137",
          "https://www.linkedin.com/in/vishnu-chauhan-bb85a1222"
        ]
      }
    </script>

    <!-- Structured data: Service -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Service",
        "serviceType": "Creator Merchandise Brand Launch",
        "provider": { "@type": "Organization", "name": "Insta Merch", "url": "https://instamerch.in/" },
        "areaServed": { "@type": "Country", "name": "India" },
        "audience": {
          "@type": "Audience",
          "audienceType": "Instagram creators and celebrities with 100K+ followers"
        },
        "description": "End-to-end merchandise brand launch for creators — premium brand identity, high-converting ecommerce store, and fully automated operations delivered in 30 days.",
        "hasOfferCatalog": {
          "@type": "OfferCatalog",
          "name": "Insta Merch Services",
          "itemListElement": [
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Premium Brand Identity" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "High-Converting Web Store" } },
            { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Automated Operations & Fulfilment" } }
          ]
        }
      }
    </script>

    <!-- Structured data: WebSite (enables sitelinks search box) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Insta Merch",
        "url": "https://instamerch.in/"
      }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Who does Insta Merch work with?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We work only with genuine influencers and celebrities who have at least 2% social media engagement, typically with 100K+ followers."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to launch a brand with Insta Merch?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Your brand goes live in 30 days. We handle strategy, product, website, and fulfilment end-to-end."
            }
          },
          {
            "@type": "Question",
            "name": "How many creators does Insta Merch take on each month?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We accept only 2 new creator partnerships per month to guarantee pristine quality across strategy, sourcing, website build, and daily order fulfilment."
            }
          },
          {
            "@type": "Question",
            "name": "What does the free strategy session include?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A 30-minute call with no commitment. You walk away with a personalised ₹50L growth roadmap for your brand and clarity on how a done-for-you merch partnership would work."
            }
          },
          {
            "@type": "Question",
            "name": "What bonuses are included when I partner with Insta Merch?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Free bonuses worth ₹3,50,000+: aggressive launch marketing & paid ads funnel strategy, a complete ecommerce website setup, operations & supply chain automation, and custom brand identity with premium packaging design."
            }
          }
        ]
      }
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>

      <h1>Insta Merch — Own a Brand That Works For You</h1>
      <p>
        Insta Merch is a done-for-you creator merchandise agency for Instagram
        influencers and celebrities with 100K+ followers. We launch your
        premium product line, ecommerce store and fulfilment in 30 days —
        adding ₹50L+/year with zero operational effort.
      </p>
      <p>
        Built by the team behind three Shark Tank India brands. ₹100Cr+ in
        online revenue generated, 20+ brands scaled.
      </p>
      <p>
        To book your free 30-minute strategy session, please enable JavaScript.
      </p>
    </noscript>
  </body>
</html>
